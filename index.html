<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vCalendar Panchang POC</title>
    <link rel="stylesheet" href="styles.css?v=20260606-3">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gaudiya Vaishnava Panchang POC</p>
          <h1>vCalendar</h1>
        </div>
        <div class="header-actions">
          <button id="languageToggle" class="language-toggle" type="button" aria-pressed="false">RU</button>
          <div id="fontSizeToggle" class="font-size-toggle" role="group" aria-label="Font size">
            <button class="font-size-button" type="button" data-font-size-choice="normal" aria-label="Normal font size" title="Normal font size">A</button>
            <button class="font-size-button" type="button" data-font-size-choice="large" aria-label="Large font size" title="Large font size">A+</button>
            <button class="font-size-button" type="button" data-font-size-choice="xlarge" aria-label="Extra large font size" title="Extra large font size">A++</button>
          </div>
          <div id="themeToggle" class="theme-toggle" role="group" aria-label="Theme">
            <button type="button" data-theme-choice="day" data-i18n="day">Day</button>
            <button type="button" data-theme-choice="night" data-i18n="night">Night</button>
            <button type="button" data-theme-choice="sepia" data-i18n="sepia">Sepia</button>
          </div>
        </div>
      </header>

      <section class="controls" aria-label="Calendar controls">
        <details class="collapsible-panel" open>
          <summary>
            <span data-i18n="mainControls">Main controls</span>
            <span class="collapse-icon" aria-hidden="true"></span>
          </summary>
          <div class="control-row primary-controls">
            <label class="location-control">
              <span data-i18n="location">Location</span>
              <select id="locationSelect">
                <option value="maalot">Maalot, Israel</option>
              </select>
            </label>
            <div class="period-controls">
              <label>
                <span data-i18n="periodFrom">From</span>
                <input id="periodFromInput" type="date" value="2026-05-01">
              </label>
              <label>
                <span data-i18n="periodTo">To</span>
                <input id="periodToInput" type="date" value="2026-05-31">
              </label>
              <div class="quick-range" aria-label="Quick ranges">
                <button id="thisWeekButton" class="secondary-button" type="button" data-i18n="thisWeek">This week</button>
                <button id="thisMonthButton" class="secondary-button" type="button" data-i18n="thisMonth">This month</button>
                <button id="fullYearButton" class="secondary-button" type="button" data-i18n="fullYear">Full year</button>
              </div>
            </div>
            <button id="renderButton" class="primary-button" type="button">Generate</button>
          </div>
        </details>
        <details class="collapsible-panel" open>
          <summary>
            <span data-i18n="eventFinder">Event finder</span>
            <span class="collapse-icon" aria-hidden="true"></span>
          </summary>
          <div class="event-jump-panel">
            <select id="eventJumpSelect" class="event-jump-select" aria-label="Find event"></select>
          </div>
        </details>
        <details class="collapsible-panel filter-collapsible">
          <summary>
            <span data-i18n="eventFilters">Event filters</span>
            <span class="collapse-icon" aria-hidden="true"></span>
          </summary>
          <div class="filter-panel">
            <div class="filter-panel-head">
              <label class="switch-label">
                <input id="eventsOnlyInput" type="checkbox" checked>
                <span data-i18n="eventsOnly">Only days with events</span>
              </label>
            </div>
            <div id="eventFilterChips" class="filter-chips" aria-label="Event filters"></div>
            <select id="eventFilterSelect" class="event-filter-select" multiple aria-hidden="true" tabindex="-1">
              <option value="ekadashi" selected>Ekadashi</option>
              <option value="parana" selected>Parana</option>
              <option value="purushottama" selected>Purushottama</option>
              <option value="festival" selected>Festivals</option>
              <option value="divineAppearance" selected>Divine appearances</option>
              <option value="vaishnavaAppearance" selected>Vaishnava appearances</option>
              <option value="vaishnavaDisappearance" selected>Vaishnava disappearances</option>
              <option value="deityTemple" selected>Deity / temple days</option>
            </select>
          </div>
        </details>
      </section>

      <section class="summary" aria-live="polite">
        <div>
          <span class="summary-label" data-i18n="location">Location</span>
          <strong id="summaryLocation">-</strong>
        </div>
        <div>
          <span class="summary-label" data-i18n="timezone">Timezone</span>
          <strong id="summaryTimezone">-</strong>
        </div>
      </section>

      <section class="calendar-wrap" tabindex="-1">
        <div class="section-head">
          <button id="prevMonthTop" class="icon-button" type="button" aria-label="Previous month">‹</button>
          <h2 id="calendarTitle">April 2026</h2>
          <button id="nextMonthTop" class="icon-button" type="button" aria-label="Next month">›</button>
          <span id="calendarStatus">Local calculation</span>
        </div>
        <div id="masaNotice" class="masa-notice" hidden></div>
        <div id="calendarHeader" class="calendar-header"></div>
        <div id="calendarGrid" class="calendar-grid">
          <div class="calendar-loading" data-i18n="loading">Loading calendar...</div>
        </div>
        <div class="month-nav bottom-nav">
          <button id="prevMonthBottom" class="nav-button" type="button">‹ <span data-i18n="previousMonth">Previous month</span></button>
          <button id="nextMonthBottom" class="nav-button" type="button"><span data-i18n="nextMonth">Next month</span> ›</button>
        </div>
      </section>

      <section class="details" tabindex="-1">
        <h2 data-i18n="selectedDay">Selected Day</h2>
        <div id="dayDetails" class="details-body" data-i18n="selectDay">Select a day in the calendar.</div>
      </section>
    </main>

    <script type="module" src="js/app.js?v=20260613-3"></script>
  </body>
</html>
